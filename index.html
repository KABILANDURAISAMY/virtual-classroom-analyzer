﻿<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Virtual Classroom</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background 1s ease-in-out;
        }
        .bulb-container {
            margin-bottom: 30px;
        }
        #bulb {
            font-size: 6rem;
            color: #555;
            transition: color 0.5s ease-in-out, text-shadow 0.5s ease-in-out;
        }
        #bulb.on {
            color: #fdd835;
            text-shadow: 0 0 20px #fdd835, 0 0 35px #fdd835;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%; 
            max-width: 400px;
            text-align: center;
            border: 1px solid transparent;
            transition: all 0.8s ease-in-out;
            z-index: 10;
        }
        .login-header {
            margin-bottom: 30px;
        }
        .login-header h2 {
            color: #333;
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }
        .login-header p {
            color: #666;
            margin-top: 5px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 600;
        }
        .input-group {
            position: relative;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            border-color: #4f46e5;
            outline: none;
        }
        .btn-login {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        .body-glow {
            background: radial-gradient(ellipse at center, #f5f3ff 0%, #e0e7ff 100%);
        }

        .error-msg {
            color: #dc3545;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 5px;
            padding: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
        body.dark-mode {
            background-color: #0f172a; /* Deep blue/slate */
        }
        body.dark-mode #bulb {
            color: #64748b; /* slate-500 */
        }
        body.dark-mode .login-container {
            background: #1e293b; /* slate-800 */
            border-color: #334155; /* slate-700 */
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        body.dark-mode .login-header h2,
        body.dark-mode .login-header p,
        body.dark-mode .form-group label {
            color: #e2e8f0; /* slate-200 */
        }
        body.dark-mode .input-group input {
            background-color: #334155; /* slate-700 */
            border-color: #475569; /* slate-600 */
            color: #f1f5f9; /* slate-100 */
        }
        body.dark-mode .input-group i {
            color: #94a3b8; /* slate-400 */
        }
    </style>
</head>

<body>
    <div class="bulb-container">
        <i class="fas fa-lightbulb" id="bulb"></i>
    </div>
    <div class="login-container">
        <div class="login-header">
            <h2>Welcome Back</h2>
            <p>Virtual Classroom Login</p>
        </div>
        <div id="errorMsg" class="error-msg"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
            </div>
            <button type="submit" class="btn-login">Login</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const bulb = document.getElementById('bulb');

            // Reset error
            errorMsg.style.display = 'none';
            errorMsg.textContent = '';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Save token and user info
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // 1. Turn on the bulb
                    bulb.classList.add('on');

                    // 2. Light up the background
                    document.body.classList.remove('dark-mode');
                    document.body.classList.add('body-glow');

                    // 3. Wait for animation then redirect
                    setTimeout(() => {
                        if (data.user.role === 'teacher') {
                            window.location.href = 'teacher_dashboard.html';
                        } else {
                            window.location.href = 'student_dashboard.html';
                        }
                    }, 1000); // 1 second delay for the glow effect
                } else {
                    errorMsg.textContent = data.message || 'Login failed. Please check your credentials.';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Connection error. Please try again later.';
                errorMsg.style.display = 'block';
                console.error(err);
            }
        });

        // Initially set to dark mode
        document.body.classList.add('dark-mode');

    </script>
</body>
</html>
