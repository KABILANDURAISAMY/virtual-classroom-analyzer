﻿<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Classroom - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS Variables */
        :root {
            --bg-color: #0f172a;
            --surface: rgba(15, 23, 42, 0.6);
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --accent: #d946ef;
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow-glow: 0 0 25px rgba(99, 102, 241, 0.25);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated Background Shapes */
        .background-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }
        .orb-1 {
            top: -100px;
            left: -100px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #4f46e5, transparent 70%);
        }
        .orb-2 {
            bottom: -150px;
            right: -150px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #d946ef, transparent 70%);
            animation-delay: -5s;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 20px) scale(1.1); }
        }

        /* Login Card */
        .login-card {
            background: var(--surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 48px;
            border-radius: 32px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }
        .login-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin: 0;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            transition: color 0.2s;
        }
        .input-wrapper .toggle-password {
            left: auto;
            right: 16px;
            cursor: pointer;
            z-index: 2;
        }
        .form-control {
            width: 100%;
            padding: 12px 40px 12px 44px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.2s;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.3);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }
        .form-control:focus + i {
            color: var(--primary);
            transform: translateY(-50%) scale(1.1);
        }
        
        .form-control::placeholder {
            color: #475569;
        }

        .glowing-bulb {
            display: none;
            color: #facc15; /* A nice yellow */
            font-size: 2rem;
            animation: bulb-glow 1.5s ease-in-out infinite;
        }

        @keyframes bulb-glow {
            0% {
                text-shadow: 0 0 5px rgba(250, 204, 21, 0.2);
            }
            50% {
                text-shadow: 0 0 25px rgba(250, 204, 21, 1), 0 0 40px rgba(250, 204, 21, 0.8);
            }
            100% {
                text-shadow: 0 0 5px rgba(250, 204, 21, 0.2);
            }
        }

        /* Page Lightening Effect */
        .page-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 255, 200, 1) 0%, rgba(255, 255, 255, 0.9) 50%, rgba(255, 255, 255, 0.5) 100%);
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 1.2s ease-in;
        }

        /* Button */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            box-shadow: var(--shadow-glow);
        }
        .btn-login:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.5);
        }
        .btn-login:active {
            transform: translateY(0);
        }

        /* Success state for button */
        .btn-login.success {
            background: transparent;
            box-shadow: none;
        }
        .btn-login.success .glowing-bulb { display: block; }
        .btn-login.success .btn-text,
        .btn-login.success .fa-arrow-right,
        .btn-login.success .spinner { display: none; }

        .btn-text {
            margin-right: 8px;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-login.loading .btn-text,
        .btn-login.loading i { display: none; }
        .btn-login.loading .spinner { display: block; }

        /* Error Message */
        .error-msg {
            background: #fef2f2;
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s;
            position: absolute;
            top: 100px; /* Adjust based on header height */
            left: 48px;
            right: 48px;
            pointer-events: none;
        }
        .error-msg.visible {
            opacity: 1;
            transform: translateY(0);
            position: relative;
            top: auto;
            left: auto;
            right: auto;
            margin-bottom: 24px;
        }
        .error-msg i { margin-right: 8px; }

        /* Shake Animation for Error */
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="background-shapes">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="page-light" id="pageLight"></div>

    <div class="login-card" id="loginCard">
        <div class="login-header">
            <div style="width: 70px; height: 70px; background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(217,70,239,0.1)); color: var(--primary); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 24px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 20px rgba(99,102,241,0.15);">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h1>Welcome Back</h1>
            <p>Enter your credentials to access the classroom</p>
        </div>

        <div id="errorMsg" class="error-msg">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText">Invalid credentials</span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" class="form-control" placeholder="name@school.com" required>
                    <i class="far fa-envelope"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <i class="fas fa-lock"></i>
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span class="btn-text">Sign In</span>
                <i class="fas fa-arrow-right"></i>
                <div class="spinner"></div>
                <i class="fas fa-lightbulb glowing-bulb"></i>
            </button>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const loginCard = document.getElementById('loginCard');
        const pageLight = document.getElementById('pageLight');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Reset Error
            errorMsg.classList.remove('visible');
            loginCard.classList.remove('shake');
            
            // Loading State
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Simulate network delay for animation effect (optional)
                await new Promise(r => setTimeout(r, 600));

                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const text = await response.text();
                const data = text ? JSON.parse(text) : {};

                if (data.success) {
                    // Glowing bulb success animation
                    loginBtn.classList.remove('loading');
                    loginBtn.classList.add('success');
                    pageLight.style.opacity = '1';
                    
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    setTimeout(() => {
                        if (data.user.role === 'teacher') {
                            window.location.href = 'teacher_dashboard.html';
                        } else {
                            window.location.href = 'student_dashboard.html';
                        }
                    }, 1500);
                } else {
                    throw new Error(data.message || 'Login failed');
                }

            } catch (error) {
                // Error State
                errorText.textContent = error.message;
                errorMsg.classList.add('visible');
                loginCard.classList.add('shake');
                
                // Reset Button
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
                
                // Remove shake class after animation so it can be re-triggered
                setTimeout(() => {
                    loginCard.classList.remove('shake');
                }, 500);
            }
        });
    </script>
</body>
</html>
